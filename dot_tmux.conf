# ── General ───────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Setulc=\E[58;2;%p1%d;%p2%d;%p3%d;m"
set -g mouse on
set -g history-limit 10000
set -g allow-passthrough on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on
set -g status-interval 5
set -g detach-on-destroy off

# ── Prefix: Ctrl+Space ────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Windows ───────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# ── Pane Navigation (vim) ────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane Resizing ─────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

# ── Copy Mode (vi) ───────────────────────────────────────────
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Quick Actions ─────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind S command-prompt -p "New session:" "new-session -A -s '%%'"
bind K confirm-before -p "Kill session? (y/n)" kill-session
bind g new-window -n "lazygit" lazygit

# ── Project Sessions ─────────────────────────────────────────
bind f run-shell "tmux neww tmux-sessionizer"
bind P run-shell "tmux neww tmux-project"

# ── Session Switching ─────────────────────────────────────────
bind -r ( switch-client -p
bind -r ) switch-client -n

# ── Theme: Catppuccin Mocha ──────────────────────────────────
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 99
set -g status-right-length 99
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#89b4fa]"
set -g status-right "#[fg=#45475a]#[bg=#45475a,fg=#cdd6f4]  #h #[bg=#a6e3a1,fg=#1e1e2e,bold] %H:%M "
set -g window-status-format "#[fg=#45475a]#[bg=#45475a,fg=#bac2de] #I #W #[fg=#45475a,bg=#1e1e2e]"
set -g window-status-current-format "#[fg=#f9e2af]#[bg=#f9e2af,fg=#1e1e2e,bold] #I #W #[fg=#f9e2af,bg=#1e1e2e]"
set -g window-status-separator ""
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#f9e2af,fg=#1e1e2e,bold"

# ── Plugins (TPM) ────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @resurrect-capture-pane-contents 'off'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '30'

run '~/.tmux/plugins/tpm/tpm'
